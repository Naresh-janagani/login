apiVersion: apps/v1
kind: Deployment
metadata:
  name: login-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: login-system
  template:
    metadata:
      labels:
        app: login-system
    spec:
      containers:
      - name: login-system
        image: jananaresh/login-system:latest
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: login-system-service
spec:
  type: NodePort
  selector:
    app: login-system
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30007